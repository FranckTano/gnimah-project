server:
  # Render (et la plupart des PaaS) injectent PORT et exigent que l'appli écoute dessus.
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: gnimah-backend
  # Fichier local, non versionné (.gitignore) : surcharge JWT_SECRET etc. pour un lancement direct
  # depuis l'IDE sans passer par docker-compose. "optional:" = aucune erreur si le fichier est absent
  # (cas normal en prod/CI/Docker, où JWT_SECRET vient d'une vraie variable d'environnement).
  config:
    import: optional:classpath:application-local.yml

  datasource:
    url: jdbc:postgresql://localhost:5432/gnimah_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none          # Flyway gère le schéma
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:noreply@gnimah.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: Africa/Abidjan
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

app:
  jwt:
    # Aucune valeur par défaut : un secret codé en dur dans un fichier versionné serait visible
    # de quiconque a accès au dépôt et permettrait de forger des tokens valides (y compris ADMIN).
    # JWT_SECRET doit être défini explicitement (variable d'environnement) dans tous les environnements,
    # y compris en local — voir docker-compose.yml ou la documentation de déploiement.
    secret: ${JWT_SECRET}
    expiration: 86400000
    refresh-expiration: 604800000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}
  keepalive:
    # Vide par défaut (désactivé en local/test). À définir en prod (Render) avec
    # la propre URL publique du service pour empêcher la mise en veille du plan gratuit.
    target-url: ${KEEPALIVE_TARGET_URL:}
  pdf:
    output-dir: ${PDF_OUTPUT_DIR:./pdfs}
  hotel:
    name: "Résidence Hôtel GNIMAH"
    address: "Abobo, Boulevard Belleville, Carrefour Mosquée, Rue Cocotier, Lot 227, Îlot 110, Abidjan"
    phone: ""
    email: ""

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false   # SMTP non configuré en dev

logging:
  level:
    com.gnimah: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
    org.flywaydb: INFO
