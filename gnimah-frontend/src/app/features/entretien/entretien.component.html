<div class="gn-route">
  <div style="display:flex;align-items:center;justify-content:flex-end;margin-bottom:16px;">
    <button class="gn-btn-p" style="padding:9px 16px;font-size:13px;" (click)="openNew()"><i class="ti ti-plus"></i>Nouvelle tâche</button>
  </div>

  <div class="gn-hk">
    <div class="gn-card" style="padding:18px;" *ngFor="let col of columns">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
        <div style="display:flex;align-items:center;gap:9px;font-weight:600;font-size:15px;color:#3a2c30;">
          <span class="gn-dot" [ngClass]="col.tone"></span>{{ col.title }}
        </div>
        <span style="background:#f4ece9;color:#9a8a8e;border-radius:100px;padding:2px 10px;font-size:12px;font-weight:600;">{{ col.tasks.length }}</span>
      </div>

      <div *ngFor="let t of col.tasks" style="border:1px solid #f0e6e2;border-radius:16px;padding:15px;margin-top:12px;">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div class="gn-serif" style="font-size:19px;color:#33262a;">Ch. {{ t.chambreNumero }}</div>
          <span class="gn-bdg" [ngClass]="t.priorite === 'URGENTE' ? 'red' : 'slate'">{{ t.priorite === 'URGENTE' ? 'Urgent' : 'Normal' }}</span>
        </div>
        <div style="font-size:13.5px;color:#6d585d;margin-top:7px;">{{ t.description }}</div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;">
          <div style="display:flex;align-items:center;gap:8px;">
            <div class="gn-av wine" style="width:26px;height:26px;font-size:10.5px;border-radius:8px;">{{ initials(t.assigneA) }}</div>
            <span style="font-size:12.5px;color:#6d585d;">{{ t.assigneA || 'Non assigné' }}</span>
          </div>
          <span style="font-size:12px;color:#a99a9d;">{{ t.dateCreation | date:'HH:mm' }}</span>
        </div>
        <div style="display:flex;gap:8px;margin-top:12px;" *ngIf="t.statut !== 'TERMINE'">
          <button *ngIf="t.statut === 'A_FAIRE'" class="gn-btn-o" style="flex:1;padding:8px;font-size:12.5px;" (click)="changerStatut(t, 'EN_COURS')"><i class="ti ti-player-play"></i>Démarrer</button>
          <button *ngIf="t.statut === 'EN_COURS'" class="gn-btn-p" style="flex:1;padding:8px;font-size:12.5px;" (click)="changerStatut(t, 'TERMINE')"><i class="ti ti-check"></i>Terminer</button>
        </div>
      </div>

      <div *ngIf="!col.tasks.length" class="gn-empty">Aucune tâche</div>
    </div>
  </div>
</div>

<!-- Dialog -->
<p-dialog [(visible)]="showDialog" header="Nouvelle tâche d'entretien" [modal]="true" [style]="{width:'500px'}">
  <form [formGroup]="form">
    <div class="p-fluid">
      <div class="field mb-3">
        <label class="font-bold">Chambre <span class="text-red-500">*</span></label>
        <p-select formControlName="chambreId" [options]="chambres" optionLabel="numero" optionValue="id" placeholder="Sélectionner une chambre" [class.ng-invalid]="isInvalid('chambreId')"></p-select>
        <small *ngIf="isInvalid('chambreId')" class="p-error">Chambre requise</small>
      </div>
      <div class="grid">
        <div class="col-6">
          <div class="field">
            <label class="font-bold">Type <span class="text-red-500">*</span></label>
            <p-select formControlName="type" [options]="typeOptions" optionLabel="label" optionValue="value"></p-select>
          </div>
        </div>
        <div class="col-6">
          <div class="field">
            <label class="font-bold">Priorité</label>
            <p-select formControlName="priorite" [options]="prioriteOptions" optionLabel="label" optionValue="value"></p-select>
          </div>
        </div>
      </div>
      <div class="field mb-3">
        <label class="font-bold">Description <span class="text-red-500">*</span></label>
        <textarea pTextarea formControlName="description" rows="3" [class.ng-invalid]="isInvalid('description')"></textarea>
        <small *ngIf="isInvalid('description')" class="p-error">Description requise</small>
      </div>
      <div class="field">
        <label class="font-bold">Assigné à</label>
        <input pInputText formControlName="assigneA" placeholder="Nom de l'agent"/>
      </div>
    </div>
  </form>
  <ng-template pTemplate="footer">
    <button class="gn-btn-o" style="padding:9px 16px;font-size:13.5px;" (click)="showDialog=false">Annuler</button>
    <button class="gn-btn-p" style="padding:9px 16px;font-size:13.5px;" [disabled]="saving" (click)="save()">
      <i class="ti ti-loader-2 gn-spin" *ngIf="saving"></i><span>Créer</span>
    </button>
  </ng-template>
</p-dialog>

<p-toast></p-toast>
