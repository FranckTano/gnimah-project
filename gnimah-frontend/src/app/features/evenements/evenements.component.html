<div class="gn-route gn-cal">
  <div class="gn-card" style="padding:22px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div class="gn-serif" style="font-size:20px;color:#2e2024;">{{ monthLabel }}</div>
      <div style="display:flex;gap:8px;">
        <button class="gn-icobtn" style="width:34px;height:34px;font-size:16px;" (click)="prevMonth()"><i class="ti ti-chevron-left"></i></button>
        <button class="gn-icobtn" style="width:34px;height:34px;font-size:16px;" (click)="nextMonth()"><i class="ti ti-chevron-right"></i></button>
      </div>
    </div>
    <div class="gn-caldays" style="margin-bottom:6px;">
      <div class="gn-th" style="text-align:left;padding:4px 6px;" *ngFor="let d of weekdays">{{ d }}</div>
    </div>
    <div class="gn-caldays">
      <div *ngFor="let c of calCells" class="gn-calcell" [class.today]="c.isToday">
        <div class="gn-calday">{{ c.day }}</div>
        <div class="gn-calev" *ngIf="c.hasEv">{{ c.evLabel }}</div>
      </div>
    </div>
  </div>

  <div class="gn-card" style="padding:22px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
      <div class="gn-serif" style="font-size:18px;color:#2e2024;">Événements à venir</div>
      <button class="gn-icobtn" style="width:32px;height:32px;font-size:16px;background:#8c2f4d;color:#fff;border:none;" (click)="openNew()"><i class="ti ti-plus"></i></button>
    </div>
    <div *ngFor="let e of upcoming; let i = index" class="gn-eventrow" (click)="openEdit(evenements[i])">
      <div style="text-align:center;flex:none;">
        <div class="gn-serif" [style.color]="eventTone(i)" style="font-size:22px;line-height:1;">{{ e.day }}</div>
        <div class="gn-slabel" style="color:#b3a2a6;font-size:9px;margin-top:2px;">{{ e.mon }}</div>
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-weight:600;font-size:14px;color:#3a2c30;">{{ e.title }}</div>
        <div style="font-size:12.5px;color:#8a7a7e;margin-top:2px;">{{ e.sub }}</div>
        <div style="font-size:12px;color:#a99a9d;margin-top:2px;">{{ e.time }}</div>
      </div>
      <button class="gn-icobtn" style="width:30px;height:30px;font-size:14px;" (click)="$event.stopPropagation(); delete(evenements[i])"><i class="ti ti-trash"></i></button>
    </div>
    <div *ngIf="!upcoming.length" class="gn-empty">Aucun événement ce mois-ci.</div>
  </div>
</div>

<!-- Dialog -->
<p-dialog [(visible)]="showDialog" [header]="editingId ? 'Modifier l\'événement' : 'Nouvel événement'" [modal]="true" [style]="{width:'560px'}" [draggable]="false">
  <form [formGroup]="form">
    <div>
      <label class="gn-flabel">Titre *</label>
      <input class="gn-input" formControlName="titre" style="margin-top:6px;" [class.gn-invalid]="isInvalid('titre')" />
    </div>
    <div style="margin-top:12px;">
      <label class="gn-flabel">Lieu *</label>
      <input class="gn-input" formControlName="lieu" style="margin-top:6px;" [class.gn-invalid]="isInvalid('lieu')" />
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;">
      <div>
        <label class="gn-flabel">Date début *</label>
        <input class="gn-input" type="date" formControlName="dateDebutJour" style="margin-top:6px;" [class.gn-invalid]="isInvalid('dateDebutJour')" />
      </div>
      <div>
        <label class="gn-flabel">Heure début *</label>
        <input class="gn-input" type="time" formControlName="dateDebutHeure" style="margin-top:6px;" [class.gn-invalid]="isInvalid('dateDebutHeure')" />
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;">
      <div>
        <label class="gn-flabel">Date fin *</label>
        <input class="gn-input" type="date" formControlName="dateFinJour" style="margin-top:6px;" [class.gn-invalid]="isInvalid('dateFinJour')" />
      </div>
      <div>
        <label class="gn-flabel">Heure fin *</label>
        <input class="gn-input" type="time" formControlName="dateFinHeure" style="margin-top:6px;" [class.gn-invalid]="isInvalid('dateFinHeure')" />
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;">
      <div>
        <label class="gn-flabel">Nombre de participants</label>
        <input class="gn-input" type="number" min="0" formControlName="nombreParticipants" style="margin-top:6px;" />
      </div>
      <div>
        <label class="gn-flabel">Montant (XOF)</label>
        <input class="gn-input" type="number" min="0" formControlName="montant" style="margin-top:6px;" />
      </div>
    </div>
    <div style="margin-top:12px;">
      <label class="gn-flabel">Description</label>
      <textarea class="gn-input" formControlName="description" rows="3" style="margin-top:6px;resize:vertical;"></textarea>
    </div>
  </form>
  <ng-template pTemplate="footer">
    <button class="gn-btn-o" style="padding:9px 16px;font-size:13.5px;" (click)="showDialog=false">Annuler</button>
    <button class="gn-btn-p" style="padding:9px 16px;font-size:13.5px;" [disabled]="saving" (click)="save()">
      <i class="ti ti-loader-2 gn-spin" *ngIf="saving"></i><span>{{ editingId ? 'Modifier' : 'Créer' }}</span>
    </button>
  </ng-template>
</p-dialog>

<p-confirmDialog></p-confirmDialog>
