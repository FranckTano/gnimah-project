<div class="gn-route gn-cal">
  <div class="gn-card" style="padding:22px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div class="gn-serif" style="font-size:20px;color:#2e2024;">{{ monthLabel }}</div>
      <div style="display:flex;gap:8px;">
        <button class="gn-icobtn" style="width:34px;height:34px;font-size:16px;" (click)="prevMonth()"><i class="ti ti-chevron-left"></i></button>
        <button class="gn-icobtn" style="width:34px;height:34px;font-size:16px;" (click)="nextMonth()"><i class="ti ti-chevron-right"></i></button>
      </div>
    </div>
    <div class="gn-caldays" style="margin-bottom:6px;">
      <div class="gn-th" style="text-align:left;padding:4px 6px;" *ngFor="let d of weekdays">{{ d }}</div>
    </div>
    <div class="gn-caldays">
      <div *ngFor="let c of calCells" class="gn-calcell" [class.today]="c.isToday">
        <div class="gn-calday">{{ c.day }}</div>
        <div class="gn-calev" *ngIf="c.hasEv">{{ c.evLabel }}</div>
      </div>
    </div>
  </div>

  <div class="gn-card" style="padding:22px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
      <div class="gn-serif" style="font-size:18px;color:#2e2024;">Événements à venir</div>
      <button class="gn-icobtn" style="width:32px;height:32px;font-size:16px;background:#8c2f4d;color:#fff;border:none;" (click)="openNew()"><i class="ti ti-plus"></i></button>
    </div>
    <div *ngFor="let e of upcoming; let i = index" class="gn-eventrow" (click)="openEdit(evenements[i])">
      <div style="text-align:center;flex:none;">
        <div class="gn-serif" [style.color]="eventTone(i)" style="font-size:22px;line-height:1;">{{ e.day }}</div>
        <div class="gn-slabel" style="color:#b3a2a6;font-size:9px;margin-top:2px;">{{ e.mon }}</div>
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-weight:600;font-size:14px;color:#3a2c30;">{{ e.title }}</div>
        <div style="font-size:12.5px;color:#8a7a7e;margin-top:2px;">{{ e.sub }}</div>
        <div style="font-size:12px;color:#a99a9d;margin-top:2px;">{{ e.time }}</div>
      </div>
      <button class="gn-icobtn" style="width:30px;height:30px;font-size:14px;" (click)="$event.stopPropagation(); delete(evenements[i])"><i class="ti ti-trash"></i></button>
    </div>
    <div *ngIf="!upcoming.length" class="gn-empty">Aucun événement ce mois-ci.</div>
  </div>
</div>

<!-- Dialog -->
<p-dialog [(visible)]="showDialog" [header]="editingId ? 'Modifier l\'événement' : 'Nouvel événement'" [modal]="true" [style]="{width:'550px'}">
  <form [formGroup]="form">
    <div class="p-fluid">
      <div class="field mb-3">
        <label class="font-bold">Titre <span class="text-red-500">*</span></label>
        <input pInputText formControlName="titre" [class.ng-invalid]="isInvalid('titre')"/>
        <small *ngIf="isInvalid('titre')" class="p-error">Titre requis</small>
      </div>
      <div class="field mb-3">
        <label class="font-bold">Lieu <span class="text-red-500">*</span></label>
        <input pInputText formControlName="lieu" [class.ng-invalid]="isInvalid('lieu')"/>
        <small *ngIf="isInvalid('lieu')" class="p-error">Lieu requis</small>
      </div>
      <div class="grid">
        <div class="col-6">
          <div class="field">
            <label class="font-bold">Date début <span class="text-red-500">*</span></label>
            <p-datepicker formControlName="dateDebut" [showTime]="true" dateFormat="dd/mm/yy" [class.ng-invalid]="isInvalid('dateDebut')"></p-datepicker>
          </div>
        </div>
        <div class="col-6">
          <div class="field">
            <label class="font-bold">Date fin <span class="text-red-500">*</span></label>
            <p-datepicker formControlName="dateFin" [showTime]="true" dateFormat="dd/mm/yy" [class.ng-invalid]="isInvalid('dateFin')"></p-datepicker>
          </div>
        </div>
      </div>
      <div class="grid">
        <div class="col-6">
          <div class="field">
            <label class="font-bold">Nombre de participants</label>
            <p-inputNumber formControlName="nombreParticipants" [min]="0"></p-inputNumber>
          </div>
        </div>
        <div class="col-6">
          <div class="field">
            <label class="font-bold">Montant (XOF)</label>
            <p-inputNumber formControlName="montant" [min]="0" suffix=" XOF"></p-inputNumber>
          </div>
        </div>
      </div>
      <div class="field">
        <label class="font-bold">Description</label>
        <textarea pTextarea formControlName="description" rows="3"></textarea>
      </div>
    </div>
  </form>
  <ng-template pTemplate="footer">
    <button class="gn-btn-o" style="padding:9px 16px;font-size:13.5px;" (click)="showDialog=false">Annuler</button>
    <button class="gn-btn-p" style="padding:9px 16px;font-size:13.5px;" [disabled]="saving" (click)="save()">
      <i class="ti ti-loader-2 gn-spin" *ngIf="saving"></i><span>{{ editingId ? 'Modifier' : 'Créer' }}</span>
    </button>
  </ng-template>
</p-dialog>

<p-confirmDialog></p-confirmDialog>
