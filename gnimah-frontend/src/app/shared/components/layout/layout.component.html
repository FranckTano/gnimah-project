<div class="gn-shell">
  <div class="gn-backdrop" [class.open]="drawerOpen" (click)="closeDrawer()"></div>

  <aside class="gn-side" [class.open]="drawerOpen">
    <div class="gn-brand">
      <div class="gn-logo gn-serif">G</div>
      <div>
        <div class="gn-brandname gn-serif">GNIMAH</div>
        <div class="gn-slabel gn-brandsub">Résidence Hôtelière</div>
      </div>
    </div>

    <nav class="gn-nav">
      <div class="gn-navsection" *ngFor="let sec of navSections">
        <div class="gn-slabel gn-secname">{{ sec.label }}</div>
        <a
          *ngFor="let it of sec.items"
          class="gn-navitem"
          [routerLink]="it.link"
          routerLinkActive="on"
          [routerLinkActiveOptions]="{ exact: false }"
          (click)="closeDrawer()"
        >
          <i class="ti" [ngClass]="it.icon"></i><span>{{ it.label }}</span>
        </a>
      </div>
    </nav>

    <div class="gn-userbox-wrap">
      <div class="gn-userbox">
        <div class="gn-av gold" style="width:38px;height:38px;font-size:13px;">{{ userInitials }}</div>
        <div class="gn-userinfo">
          <div class="gn-username">{{ currentUser?.nomComplet }}</div>
          <div class="gn-userrole">{{ roleLabel }}</div>
        </div>
        <button class="gn-logoutbtn" (click)="logout()" title="Déconnexion"><i class="ti ti-logout-2"></i></button>
      </div>
    </div>
  </aside>

  <div class="gn-main">
    <header class="gn-topbar">
      <button class="gn-icobtn gn-ham" (click)="toggleDrawer()"><i class="ti ti-menu-2"></i></button>
      <div class="gn-titlewrap">
        <div class="gn-serif gn-pagetitle">{{ pageTitle }}</div>
        <div class="gn-pagesub gn-hideSm">{{ pageSub }}</div>
      </div>
      <div class="gn-search gn-hideSm">
        <i class="ti ti-search"></i>
        <input class="gn-input" placeholder="Rechercher client, reçu, chambre…" />
      </div>
      <button class="gn-icobtn gn-bell"><i class="ti ti-bell"></i><span class="gn-bell-dot"></span></button>
      <div class="gn-hideSm gn-dateinfo">
        <div class="gn-date">{{ today | date:'EEEE d MMMM yyyy':'':'fr' }}</div>
        <div class="gn-city">Abidjan</div>
      </div>
    </header>

    <main class="gn-body">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
